<script>
function toggleTheme() {
  var html = document.documentElement;
  var current = html.getAttribute('data-theme') || 'dark';
  var next = current === 'dark' ? 'light' : 'dark';
  html.setAttribute('data-theme', next);
  localStorage.setItem('theme', next);
  updateToggleIcon();
}
function updateToggleIcon() {
  var btn = document.querySelector('.theme-toggle');
  if (!btn) return;
  var t = document.documentElement.getAttribute('data-theme') || 'dark';
  btn.textContent = t === 'dark' ? '☀️' : '🌙';
}
document.addEventListener('DOMContentLoaded', updateToggleIcon);
</script>

<script>
  const sideMenu = document.getElementById("sideMenu");
  function openMenu() {
    sideMenu.style.width = "250px";
    document.body.addEventListener("click", outsideClickListener);
  }
  function closeMenu() {
    sideMenu.style.width = "0";
    document.body.removeEventListener("click", outsideClickListener);
  }
  function outsideClickListener(event) {
    const isClickInside = sideMenu.contains(event.target) || event.target.classList.contains("menu-icon");
    if (!isClickInside) closeMenu();
  }
</script>
<script>
function toggleBoxartVisibility() {
  var checked = document.getElementById('toggleBoxart').checked;
  var imgs = document.querySelectorAll('#romBody img');
  imgs.forEach(function(img) {
    if (checked) {
      // Activar: cargar imagen
      if (img.dataset.src) {
        img.src = img.dataset.src;
        img.removeAttribute('data-src');
      }
      img.style.display = '';
    } else {
      // Desactivar: quitar src para no consumir datos
      if (img.src) {
        img.dataset.src = img.src;
        img.removeAttribute('src');
      }
      img.style.display = 'none';
    }
  });
  window._boxartVisible = checked;
}
document.addEventListener('DOMContentLoaded', function() {
  var origRender = window.renderTable;
  if (!origRender) return;
  // Observe new rows: if boxart off, remove src from new images
  var observer = new MutationObserver(function() {
    if (!window._boxartVisible) {
      document.querySelectorAll('#romBody img').forEach(function(img) {
        if (img.src) {
          img.dataset.src = img.src;
          img.removeAttribute('src');
        }
        img.style.display = 'none';
      });
    }
  });
  var romBody = document.getElementById('romBody');
  if (romBody) observer.observe(romBody, {childList: true});
  // Initial: hide and remove src
  document.querySelectorAll('#romBody img').forEach(function(img) {
    if (img.src) {
      img.dataset.src = img.src;
      img.removeAttribute('src');
    }
    img.style.display = 'none';
  });
});
window._boxartVisible = false;
</script>
